services:
  - type: web
    name: pactum-backend
    runtime: python
    buildCommand: pip install -r requirements-backend.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/config
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEMO_MODE
        value: "false"
      - key: LLM_PROVIDER
        value: gemini
      - key: LOCAL_ONLY_READS
        value: "true"
      - key: SUPABASE_SKIP
        value: "false"
      # --- Fill these in Render dashboard (Environment tab) ---
      - key: LLM_API_KEY
        sync: false
      - key: PIONEER_API_KEY
        sync: false
      - key: PIONEER_BASE_URL
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: FAL_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
